# workenv tmux core (kernel layer).
#
# Baked at /opt/workenv/tmux-core.conf and loaded first via `tmux -f` (see
# cmd_tmux in bin/workenv). It applies the terminal/passthrough integration that
# nvim, the host clipboard (OSC 52 fallback) and image protocols need — so they
# work regardless of whose tmux.conf runs — then hands off to the user config
# (ours by default, or a mounted one) and an optional local-tweak file.
#
# Userland (sourced below) wins on any setting it re-declares.

# ── Terminal / integration ──────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -ga terminal-features "*:RGB"
set -ga terminal-features "*:hyperlinks"
set -ga terminal-features "*:usstyle"
set -g allow-passthrough on
set -sg escape-time 0
set -g focus-events on

# ── Hand off to userland ────────────────────────────────────────────────
# -q: a missing file is not an error (BYO users may omit either).
source-file -q "$XDG_CONFIG_HOME/tmux/tmux.conf"
source-file -q "$XDG_CONFIG_HOME/tmux/tmux.local.conf"
