# ── Prefix ────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── Terminal ───────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -ga terminal-features "*:RGB"
set -ga terminal-features "*:hyperlinks"
set -ga terminal-features "*:usstyle"
set -g allow-passthrough on
set -g mouse on

# ── Indexing ───────────────────────────────────────────────────────────
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ── Behavior ───────────────────────────────────────────────────────────
set -sg escape-time 0
set -g history-limit 50000
set -g focus-events on
setw -g mode-keys vi
set -g status-interval 5

# ── Keys ───────────────────────────────────────────────────────────────
bind r source-file "$XDG_CONFIG_HOME/tmux/tmux.conf" \; display "tmux.conf reloaded"

# Splits
bind v split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Windows
bind -n M-T new-window -c "#{pane_current_path}"
bind -n M-H previous-window
bind -n M-L next-window

# Copy mode (vi)
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-no-clear

# Session save/load scripts
bind C-s run-shell "$XDG_CONFIG_HOME/tmux/scripts/session_save.sh"
bind C-r run-shell "$XDG_CONFIG_HOME/tmux/scripts/session_load.sh"

# ── Plugins ────────────────────────────────────────────────────────────
set-environment -g TMUX_PLUGIN_MANAGER_PATH "$XDG_DATA_HOME/tmux/plugins/"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'omerxx/tmux-floax'
set -g @plugin 'catppuccin/tmux'

# catppuccin
set -g @catppuccin_flavour 'mocha'
set -g @catppuccin_window_status_style "rounded"

# yank
set -g @yank_selection_mouse 'clipboard'

# resurrect + continuum
set -g @resurrect-dir "$XDG_STATE_HOME/tmux/resurrect"
set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'

# floax
set -g @floax-bind 'f'
set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color 'cyan'
set -g @floax-text-color 'blue'

# TPM init
if "test ! -d $TMUX_PLUGIN_MANAGER_PATH/tpm" \
   "run 'cp -r /opt/tpm $TMUX_PLUGIN_MANAGER_PATH/tpm && $TMUX_PLUGIN_MANAGER_PATH/tpm/bin/install_plugins'"

run '$TMUX_PLUGIN_MANAGER_PATH/tpm/tpm'
